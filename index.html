      margin-top: 16px;
      padding-top: 16px;

      text-align: center;

    .detail-label {

      opacity: 0.85;

      letter-spacing: 0.5px;

      border-radius: 8px;
      margin-bottom: 24px;

      font-weight: 600;
      margin-bottom: 16px;
      color: #1a1a1a;
    }
    .filter-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .filter-chip {
      padding: 8px 16px;
      border: 1px solid #ddd;
      background: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;

    .stat-label {

    function updateTime() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      
      document.getElementById('current-time').textContent = `${hours}:${minutes}:${seconds}`;
      
      const year = now.getFullYear();
      const month = now.getMonth() + 1;
      const date = now.getDate();
      const dayNames = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
      const dayName = dayNames[now.getDay()];
      
      document.getElementById('current-date').textContent = `${year}년 ${month}월 ${date}일 ${dayName}`;
    }

      document.getElementById('weather-desc').textContent = weather.desc;
      document.getElementById('weather-temp').textContent = weather.temp;
      document.getElementById('sunset-time').textContent = weather.sunset;

      updateTime();
      updateWeather();
      updateFilter();
    }

    // 나머지 함수들...
    let currentFilter = 'all';
    let displayedNews = [];

    function filterNews(category) {
      currentFilter = category;
      updateFilter();
    }

    function filterBySearch() {
      updateFilter();
    }

    function isRecentNews(dateStr) {
      const newsDate = new Date(dateStr);
      const today = new Date();
      const threeMonthsAgo = new Date(today.getFullYear(), today.getMonth() - 3, today.getDate());
      return newsDate >= threeMonthsAgo;
    }

    function updateFilter() {
      const searchTerm = document.getElementById('search-input').value.toLowerCase();
      
      let filtered = newsData.filter(news => {
        const isRecent = isRecentNews(news.date);
        const categoryMatch = currentFilter === 'all' || news.category === currentFilter;
        const searchMatch = searchTerm === '' || 
                           news.title.toLowerCase().includes(searchTerm) || 
                           news.excerpt.toLowerCase().includes(searchTerm);
        return isRecent && categoryMatch && searchMatch;
      });

      displayedNews = filtered.sort((a, b) => new Date(b.date) - new Date(a.date));

      updateChips();
      renderNews();
      updateStats();
    }

    function updateChips() {
      document.querySelectorAll('.filter-chip').forEach(chip => {
        const category = chip.getAttribute('onclick').match(/'([^']+)'/)[1];
        chip.classList.toggle('active', category === currentFilter);
      });
    }

    function renderNews() {
      const grid = document.getElementById('news-grid');
      if (displayedNews.length === 0) {
        grid.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;">검색 결과가 없습니다.</div>';
        return;
      }

      grid.innerHTML = displayedNews.map((news, index) => `
        <div class="news-card">
          ${index === 0 ? '<div class="news-badge">최신</div>' : ''}
          <div class="news-category ${getCategory(news.category)}">${getCategoryLabel(news.category)}</div>
          <div class="news-title">${news.title}</div>
          <div class="news-excerpt">${news.excerpt}</div>
          <div class="news-meta">
            <span class="news-source">${news.source}</span>
            <span class="news-date">${formatFullDate(news.date)}</span>
          </div>
          <a href="${news.url}" target="_blank" class="news-link" onclick="event.stopPropagation();">
            기사 보기 ↗
          </a>
        </div>
      `).join('');
    }

    function updateStats() {
      document.getElementById('total-count').textContent = displayedNews.length;
      document.getElementById('smart-city-count').textContent = newsData.filter(n => isRecentNews(n.date) && n.category === 'smart-city').length;
      document.getElementById('ai-count').textContent = newsData.filter(n => isRecentNews(n.date) && n.category === 'ai').length;
      document.getElementById('sejong-count').textContent = newsData.filter(n => isRecentNews(n.date) && (n.source.includes('세종') || n.title.includes('세종'))).length;
    }

    function getCategory(cat) {
      const map = { 'smart-city': 'cat-smart-city', 'ai': 'cat-ai', 'bidding': 'cat-gov' };
      return map[cat] || 'cat-gov';
    }

    function getCategoryLabel(cat) {
      const map = {
        'smart-city': '🏙️ 스마트시티',
        'ai': '🤖 AI 동향',
        'bidding': '💼 수주/공모',
        'gov': '📋 정부'
      };
      return map[cat] || '뉴스';
    }

    function formatFullDate(dateStr) {
      const date = new Date(dateStr + 'T00:00:00');
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}.${month}.${day}`;
    }

    // 초기 시간과 날씨 업데이트
    setInterval(updateTime, 1000);
    
    // 대시보드 초기화 (샘플 데이터 표시)
    initializeDashboard();
  </script>
</body>
</html>
